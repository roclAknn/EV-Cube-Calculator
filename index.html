    <script>
      function toggleMenu(){
        const d=document.getElementById('dropdown');
        const b=document.getElementById('menu-btn');
        const open=d.classList.toggle('open');
        b.classList.toggle('active',open);
      }
      document.addEventListener('click',function(e){
        if(!e.target.closest('#menu-btn')&&!e.target.closest('#dropdown')){
          document.getElementById('dropdown').classList.remove('open');
          document.getElementById('menu-btn').classList.remove('active');
        }
      });
      function fitScale(type = ""){
        const types = ["fit", "default"];
        const btn = document.querySelector(".header-scalingbtn");
        if ( types.indexOf(type) < 0 ){
          let stat = btn.stat || "";
          let p = types.indexOf(stat) + 1;
          type = types[p % types.length];
        }
        
        btn.stat = type;
        btn.classList[ type == "fit" ? "add" : "remove" ]("pressed");
        
        // スケーリングの適用
        const main = document.getElementsByTagName("main")[0];
        const content = document.querySelector("#maindiv-wrapper");
        
        let sc = 1;
        switch (type){
          case "fit":
            sc = Math.min(1, main.clientWidth / content.scrollWidth);
            resizeObserver.observe(main);
            resizeObserver.observe(content);
            break;
          default:
            resizeObserver.unobserve(main);
            resizeObserver.unobserve(content);
            break;
        }
        console.log(sc, main.clientWidth, content.scrollWidth);
        content.style.scale = sc;
        
        if (type == "fit" && sc < 1){
          main.classList.add("fit");
        } else {
          main.classList.remove("fit");
        }
        
        // cookieの書き込み
        setCookie("scale", type);
      }
      
      // リサイズObserver
      const resizeObserver = new ResizeObserver(entries => {
        // for (let entry of entries) {}
        fitScale("fit");
      });
      
      function changeAlign(pos = ""){
        const aligns = ["left", "center", "right"];
        const parent = document.querySelector(".header-alignbtn");
        let active = parent.querySelector(`.icon-btn.active`);
        if ( aligns.indexOf(pos) < 0 ){
          pos = active.id.split("-")[1];
          let p = aligns.indexOf(pos) + 1;
          pos = aligns[p % aligns.length];
        }
        active.classList.remove("active");
        const elem = parent.querySelector(`#align-${pos}`);
        elem.classList.add('active');
        
        // 配置の適用
        const main = document.getElementsByTagName("main")[0];
        const scalingbtn = document.querySelector(".header-scalingbtn");
        aligns.forEach( p => {
          main.classList[ p == pos ? "add" : "remove" ](p);
        });
        
        // cookieの書き込み
        setCookie("align", pos);
      }

    <script>
      {
        // 潜在能力表示量の調整つまみの動作処理
        const input = document.getElementById("input-potential-displayamount");
        const container = input.parentElement;
        const knob   = container.getElementsByClassName("knob")[0];
        const fill   = container.getElementsByClassName("slider-fill")[0];
        const slider = container.getElementsByClassName("slider-container")[0];
        const margin = 5;
        const positions = [0+margin, 50, 100-margin];
        let positionIndex = 1;
        let isDragging = false;
        updateKnobPosition();
        
        slider.addEventListener("click", moveKnob);
        slider.addEventListener("mousedown", startDrag);
        slider.addEventListener("touchstart", startDrag);
        
        function startDrag(event) {
            endDrag(); // 重複登録を防ぐ
            isDragging = true;
            document.addEventListener("mousemove", dragKnob);
            document.addEventListener("mouseup", endDrag);
            document.addEventListener("touchmove", dragKnob);
            document.addEventListener("touchend", endDrag);
            document.addEventListener("dragend", endDrag); // mouseupが発生しない場合の終了処理
        }
        function endDrag(event) {
            isDragging = false;
            document.removeEventListener("mousemove", dragKnob);
            document.removeEventListener("mouseup", endDrag);
            document.removeEventListener("touchmove", dragKnob);
            document.removeEventListener("touchend", endDrag);
            document.removeEventListener("dragend", endDrag);
        }
        function dragKnob(event) {
            if (!isDragging ) return;
            moveKnob(event);
        }
        function moveKnob(event) {
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            if ( clientX == 0 ) return;
            const rect = slider.getBoundingClientRect();
            let offsetX = clientX - rect.left;
            let stepWidth = rect.width / 3;
            // console.log([rect.width, clientX - rect.left], [stepWidth, offsetX]);
            positionIndex = Math.min(2, Math.max(0, Math.floor(offsetX / stepWidth)));
            updateKnobPosition();
        }
        
        function updateKnobPosition() {
            knob.style.left = positions[positionIndex] + "%";
            knob.style.transform = "translateX(-50%)";
            fill.style.width = positions[positionIndex] + "%";
            input.value = positionIndex;
            input.onchange();
        }
      }
    </script>
    <script>
      /* cookie */
      function setCookie(name, value, days = 365) {
        const expires = new Date(Date.now() + days * 864e5).toUTCString();
        document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
      }
      
      function getCookie(name) {
        return document.cookie.split("; ").reduce((r, v) => {
          const [key, val] = v.split("=");
          return key === name ? decodeURIComponent(val) : r;
        }, null);
      }
      
      // cookieから揃え位置を復元
      let pos = getCookie("align");
      let scale = getCookie("scale");
      fitScale(scale || "fit"); //cookieへの追加もされる
      changeAlign(pos || "left"); //cookieへの追加もされる
    </script>
